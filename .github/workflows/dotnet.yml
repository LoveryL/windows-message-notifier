name: .NET

on:
  push:
    branches:
      - main

jobs:
  build-and-release:

    runs-on: windows-latest
    
    permissions:
      contents: write  

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-tags: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build (Release)
      run: dotnet build --configuration Release --no-restore --output "${{ github.workspace }}\build-output"

    - name: Test
      run: dotnet test --configuration Release --no-build --verbosity normal

    - name: Package build artifacts
      run: |
        Compress-Archive -Path "${{ github.workspace }}\build-output\*" -DestinationPath "${{ github.workspace }}\release.zip" -Force

    - name: Delete existing pre release and tag
      run: |
        gh release delete pre --yes 2>$null; exit 0
        git tag -d pre 2>$null; exit 0
        git push origin :refs/tags/pre 2>$null; exit 0
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create pre tag
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag -f pre
        git push origin pre --force

    - name: Create Release and upload artifact using gh CLI
      run: |
        gh release create pre `
          --title "auto-publish" `
          --notes "GitHub Action 自动推送" `
          --prerelease `
          "${{ github.workspace }}\release.zip"
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
