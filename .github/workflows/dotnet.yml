name: .NET

on:
  push:
    branches:
      - main

jobs:
  build-and-release:

    runs-on: windows-latest
    
    permissions:
      contents: write  

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-tags: true

        node-version: '20'

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore


    - name: Publish (Release)
      run: dotnet publish --configuration Release --output "${{ github.workspace }}\build-output" --no-restore

    - name: Test
      run: dotnet test --configuration Release --no-build --verbosity normal

    - name: Package build artifacts
      run: |
        Compress-Archive -Path "${{ github.workspace }}\build-output\*" -DestinationPath "${{ github.workspace }}\release.zip" -Force

    - name: Generate unique tag name
      id: tagname
      run: |
        $timestamp = Get-Date -Format "yyyyMMddHHmmss"
        $commitShort = git rev-parse --short HEAD
        echo "TAG_NAME=pre-$commitShort-$timestamp" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
      shell: pwsh

    - name: Create pre tag (non-overwriting)
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag ${{ steps.tagname.outputs.TAG_NAME }}
        git push origin ${{ steps.tagname.outputs.TAG_NAME }}
      shell: pwsh

    - name: Create Release with unique tag
      run: |
        gh release create ${{ steps.tagname.outputs.TAG_NAME }} `
          --title "auto-publish ${{ steps.tagname.outputs.TAG_NAME }}" `
          --notes "GitHub Action 自动推送\nCommit: ${{ github.sha }}\nTag: ${{ steps.tagname.outputs.TAG_NAME }}" `
          --prerelease `
          "${{ github.workspace }}\release.zip"
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
