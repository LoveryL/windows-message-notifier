name: .NET

on:
  push:
    branches:
      - main

jobs:
  build-and-release:

    runs-on: windows-latest
    
    permissions:
      contents: write  

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-tags: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    # ✅ 关键修改：使用 publish 替代 build，确保生成 .exe 和可运行文件
    - name: Publish (Release)
      run: dotnet publish --configuration Release --no-restore

    # ✅ 打包 publish 目录下的所有文件
    - name: Package build artifacts
      run: |
        Compress-Archive -Path "${{ github.workspace }}\bin\Release\net10.0-windows10.0.22621.0\publish\*" -DestinationPath "${{ github.workspace }}\release.zip" -Force

    # ✅ 删除已有的 pre Release（如果存在）
    - name: Delete existing pre release
      run: |
        gh release delete pre --yes || true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ✅ 删除已有的 pre tag
    - name: Delete existing pre tag
      run: |
        git tag -d pre || true
        git push origin :refs/tags/pre || true

    # ✅ 重新创建 pre tag
    - name: Create pre tag
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git tag pre
        git push origin pre

    # ✅ 创建新的 pre Release，上传构建产物
    - name: Create GitHub Release (pre)
      uses: softprops/action-gh-release@v1
      with:
        tag_name: pre
        name: pre
        body: "GitHub Action 自动推送"
        prerelease: true
        files: ${{ github.workspace }}\release.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
